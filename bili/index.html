<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <!-- 设置视口宽度为1024px，模拟桌面屏幕尺寸，使移动版网页可能触发响应式桌面布局 -->
    <meta name="viewport" content="width=1024, initial-scale=1, maximum-scale=2, user-scalable=yes">
    <title>Bilibili 电脑版引导</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .card {
            background: #fff;
            border-radius: 16px;
            padding: 30px 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-sizing: border-box;
        }
        h1 {
            color: #00a1d6;
            font-size: 28px;
            margin-bottom: 15px;
            font-weight: 500;
        }
        p {
            color: #555;
            line-height: 1.6;
            margin-bottom: 25px;
            font-size: 16px;
        }
        .btn-group {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin-bottom: 20px;
        }
        .btn {
            display: inline-block;
            background: #00a1d6;
            color: #fff;
            padding: 12px 28px;
            border-radius: 30px;
            text-decoration: none;
            font-size: 18px;
            font-weight: 500;
            transition: background 0.2s;
            border: none;
            cursor: pointer;
            flex: 0 1 auto;
        }
        .btn:hover {
            background: #0082b3;
        }
        .btn.secondary {
            background: #f0f0f0;
            color: #333;
        }
        .btn.secondary:hover {
            background: #e0e0e0;
        }
        .note {
            font-size: 14px;
            color: #999;
            border-top: 1px solid #eee;
            padding-top: 20px;
            margin-top: 15px;
        }
        .note a {
            color: #00a1d6;
            text-decoration: none;
        }
        .warning {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 12px 15px;
            text-align: left;
            border-radius: 8px;
            margin: 20px 0;
            font-size: 14px;
            color: #856404;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>📺 Bilibili 电脑版引导</h1>
        <p>我们正在尝试为你切换到桌面版布局。<br>但由于技术限制，可能仍需手动操作。</p>

        <div class="btn-group">
            <a href="https://www.bilibili.com" class="btn">直接访问电脑版</a>
            <button class="btn secondary" onclick="forceDesktop()">尝试强制切换</button>
        </div>

        <div class="warning">
            <strong>🔍 如果跳转后仍是手机版：</strong><br>
            • 在浏览器菜单中寻找「桌面版网站」并手动开启（通常藏在 ⋮ 或设置里）。<br>
            • 部分浏览器（如微信内）无此功能，可尝试点击下方链接复制到系统浏览器打开。
        </div>

        <p class="note">
            ⚡ 本页面已设置视口宽度为1024px，尽可能模拟桌面环境。<br>
            📱 若自动跳转未发生，请点击上方按钮。
        </p>
    </div>

    <script>
        (function() {
            // 检测是否为移动设备（User-Agent 匹配）
            const isMobile = /mobile|android|iphone|ipad|phone|blackberry|iemobile|opera mini/i.test(navigator.userAgent);

            // 强制切换函数：跳转至电脑版域名
            window.forceDesktop = function() {
                window.location.href = 'https://www.bilibili.com';
                // 备选：尝试在新窗口打开（可能被浏览器拦截）
                // window.open('https://www.bilibili.com', '_blank');
            };

            // 如果是移动设备，延迟2秒自动尝试跳转
            if (isMobile) {
                // 显示一段提示（可选）
                const originalTitle = document.querySelector('h1').innerText;
                document.querySelector('h1').innerHTML = '⏳ 检测到移动设备，准备跳转...';
                
                setTimeout(() => {
                    forceDesktop();
                }, 2000);
            } else {
                // 非移动设备：修改提示文案
                document.querySelector('h1').innerHTML = '🖥️ 你已在使用电脑设备';
                document.querySelector('.warning').innerHTML = '当前设备可能已自动显示电脑版，点击下方按钮可直接访问。';
            }
        })();
    </script>
</body>
</html>
