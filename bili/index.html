
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>跳转到B站PC版</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }
        .container {
            text-align: center;
            padding: 20px;
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        h1 {
            color: #00a1d6;
        }
        p {
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>正在跳转到B站PC版</h1>
        <p>请稍候，我们正在为您切换到电脑版界面...</p>
    </div>

    <script>
        // 检测是否为移动设备
        function isMobileDevice() {
            return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        }

        // 跳转到B站PC版
        function redirectToBilibiliPC() {
            if (isMobileDevice()) {
                // 在移动端跳转到PC版B站
                window.location.href = "https://www.bilibili.com/?spm_id_from=333.1007.0.0";
            } else {
                // 在PC端直接访问B站主页
                window.location.href = "https://www.bilibili.com/";
            }
        }

        // 页面加载完成后执行跳转
        window.addEventListener('DOMContentLoaded', redirectToBilibiliPC);
    </script>
</body>
</html>
