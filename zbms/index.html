<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZB Mathematica</title>
    <link rel="stylesheet" type="text/css" href="/index.css">
    <style>
        :root {
            --teal-700: #0d7377;
            --teal-500: #14a3a8;
            --teal-200: #a3e4d7;
            --bg: #f0fdfa;
            --card-bg: #ffffff;
            --text: #1a2e2f;
            --shadow: 0 4px 16px rgba(13, 115, 119, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', 'MapleMonoNL-Regular', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }

        /* 英雄区域：背景图 + 标题 */
        .hero {
            position: relative;
            width: 100%;
            min-height: 50vh;
            background-image: url('/zbms/zbms.jpg');
            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 半透明叠加层，提升文字可读性 */
        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(13, 115, 119, 0.65); /* 蓝绿遮罩 */
        }

        .hero h1 {
            position: relative;
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            color: #ffffff;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.3);
            font-weight: 700;
            letter-spacing: 2px;
            text-align: center;
            padding: 0 1rem;
            font-family: 'MapleMonoNL-Regular', monospace;
        }

        /* 内容容器 */
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }

        .tagline {
            text-align: center;
            font-size: 1.5rem;
            color: var(--teal-700);
            font-weight: 500;
            margin: 1.5rem 0 2rem;
        }

        /* iframe 容器卡片 */
        .iframe-card {
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: var(--shadow);
            overflow: hidden;
            margin: 0 auto;
            max-width: 100%;
            aspect-ratio: 4 / 3;
            border: 1px solid var(--teal-200);
        }

        .iframe-card iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* 桌面端调整 iframe 宽度 */
        @media (min-width: 768px) {
            .iframe-card {
                max-width: 70%;
            }
        }

        /* 移动端细微优化 */
        @media (max-width: 480px) {
            .hero {
                min-height: 40vh;
            }
            .container {
                padding: 1.5rem 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="hero">
        <h1>ZB Math.</h1>
    </div>

    <!-- 主体内容 -->
    <div class="container">
        <p class="tagline math">Calculate Infinity by Scratch.</p>

        <!-- 嵌入 ZBMS 计算器 -->
        <div class="iframe-card">
            <iframe src="https://sqy419.axolotlpower.com/zbms/ZBMS%201.0.5.html" title="ZB Mathematica Calculator" allowfullscreen></iframe>
        </div>
    </div>
</body>
</html>
