<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQY的个人主页</title>
    <style>
        :root {
            --bg: #f5f7fa;
            --card-bg: #ffffff;
            --primary: #4a90d9;
            --text: #2c3e50;
            --subtext: #607d8b;
            --shadow: 0 2px 12px rgba(0,0,0,0.08);
            --radius: 16px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            padding: 2rem 1rem;
        }

        /* 主容器 */
        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        /* 头部 */
        .header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .header h1 {
            font-size: 2.8rem;
            font-weight: 700;
            margin-bottom: 1rem;
            color: #1a1a2e;
            letter-spacing: 2px;
        }

        .avatar {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid white;
            box-shadow: var(--shadow);
            transition: transform 0.3s ease;
        }

        .avatar:hover {
            transform: scale(1.05);
        }

        /* 信息卡片 */
        .info-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 1.8rem;
            margin-bottom: 2rem;
            box-shadow: var(--shadow);
            text-align: center;
        }

        .info-card p {
            font-size: 1.1rem;
            margin: 0.4rem 0;
        }

        .highlight {
            font-weight: 600;
            color: var(--primary);
        }

        /* 作品标题区 */
        .section-title {
            text-align: center;
            margin: 2.5rem 0 1.5rem;
            font-size: 2rem;
            font-weight: 700;
            color: #1a1a2e;
        }

        .subtitle {
            text-align: center;
            color: var(--subtext);
            margin-bottom: 2rem;
        }

        /* 作品网格 */
        .works-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 2rem;
            margin-bottom: 3rem;
        }

        .work-item {
            background: var(--card-bg);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: transform 0.25s ease, box-shadow 0.25s ease;
            display: flex;
            flex-direction: column;
        }

        .work-item:hover {
            transform: translateY(-6px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.12);
        }

        .work-item a {
            display: block;
            overflow: hidden;
        }

        .work-item img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            display: block;
            transition: transform 0.3s ease;
        }

        .work-item:hover img {
            transform: scale(1.03);
        }

        .work-info {
            padding: 1.2rem 1.2rem 1.5rem;
            text-align: center;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .work-info h3 {
            font-size: 1.2rem;
            margin-bottom: 0.5rem;
            color: #1a1a2e;
        }

        .work-info p {
            color: var(--subtext);
            font-size: 0.95rem;
            margin: 0.2rem 0;
        }

        .work-info .desc {
            margin-top: 0.5rem;
            font-style: italic;
        }

        /* 底部链接 */
        .footer-links {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1.5rem;
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 1px solid #e0e0e0;
        }

        .footer-links a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
            font-size: 1.05rem;
            transition: color 0.2s;
        }

        .footer-links a:hover {
            color: #1a1a2e;
            text-decoration: underline;
        }

        /* 移动端调整 */
        @media (max-width: 600px) {
            .header h1 {
                font-size: 2rem;
            }

            .works-grid {
                grid-template-columns: 1fr;
                gap: 1.5rem;
            }

            .avatar {
                width: 130px;
                height: 130px;
            }

            .footer-links {
                flex-direction: column;
                align-items: center;
                gap: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <div class="header">
            <h1>你好！我是SQY！</h1>
            <img 
                src="https://upload-static.saobby.com/static/upload/zAC4gHRwCLILYOQd.png"
                alt="Axolotl"

            >
        </div>

        <!-- 关于我 -->
        <div class="info-card">
            <p><span class="highlight">🎂</span> 2010.04.19</p>
            <p><span class="highlight">🧠</span> ENTP一枚～</p>
            <p><span class="highlight">❤️</span> 喜欢数学. 爱你😘</p>
        </div>

        <!-- 我的作品 -->
        <h2 class="section-title">我的Scratch作品</h2>

        <div class="works-grid">

            <div class="work-item">

                </a>
                <div class="work-info">

                </div>
            </div>

            <!-- ZB Mathematica -->

                    <img src="/zbms/Screenshot_20240902_214649_com.huawei.photos_edit_880259992608359.jpg" alt="ZB Mathematica">
                </a>
                <div class="work-info">
                    <h3>Calculate Infinity in Scratch</h3>
                    <p>ZB Mathematica</p>

                </div>
            </div>

            <!-- STeX -->
            <div class="work-item">
                <a href="#" title="暂无链接">
                    <img src="/img/Screenshot_20240917_222705_com.huawei.browser_edit_323885050428367.jpg" alt="STeX">

                </div>
            </div>
        </div>

        <!-- 底部链接 -->
        <div class="footer-links">
            <a href="https://www.saobby.com">Saobby的个人主页</a>
            <a href="https://www.axolotlpower.com">Gtd232:Axolotlpower</a>
        </div>
    </div>

    <!-- Live2D 看板娘 -->
    <script src="https://fastly.jsdelivr.net/npm/live2d-widgets@0/autoload.js"></script>
</body>
</html>
